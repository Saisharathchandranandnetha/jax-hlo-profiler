training:
  batch_size: 32
  num_epochs: 10
  learning_rate: 1e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

optimizer:
  type: adam
  beta1: 0.9
  beta2: 0.999
  epsilon: 1e-8

loss:
  type: cross_entropy
  label_smoothing: 0.0

scheduler:
  type: cosine
  warmup_proportion: 0.1
  num_cycles: 0.5

data:
  train_split: 0.8
  validation_split: 0.1
  test_split: 0.1
  num_workers: 4
  prefetch_size: 2

checkpointing:
  save_steps: 1000
  save_total_limit: 3
  resume_from_checkpoint: null

device:
  dtype: float32
  use_amp: false
