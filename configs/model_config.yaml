model:
  type: transformer
  vocab_size: 50257
  max_seq_length: 1024
  hidden_dim: 768
  num_layers: 12
  num_heads: 12
  head_dim: 64
  ffn_dim: 3072
  dropout_rate: 0.1
  activation: gelu
  
embedding:
  embedding_dim: 768
  position_encoding: absolute
  layer_norm_eps: 1e-12

attention:
  attention_type: scaled_dot_product
  use_bias: true
  attention_dropout: 0.1

quantization:
  enabled: false
  precision: float32
